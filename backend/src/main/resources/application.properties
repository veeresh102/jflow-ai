server.port=8080
spring.application.name=jflow-ai

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:jflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175

# Gemini AI API Configuration
# Chat automatically falls back to demo mode when GEMINI_API_KEY is not set.
# Set GEMINI_DEMO_MODE=true to force demo responses even when a key exists.
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_API_MODEL:gemini-2.5-flash}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/${gemini.api.model}:generateContent
gemini.api.demo-mode=${GEMINI_DEMO_MODE:false}
